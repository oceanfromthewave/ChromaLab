<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0b10" />
    <meta name="description" content="Chroma Lab — design beautiful, accessible color palettes from images, harmony rules, and OKLCH tone scales. Export to Tailwind, CSS variables, and JSON." />
    <link rel="preconnect" href="https://rsms.me/" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />
    <title>Chroma Lab — palette studio for designers & developers</title>
    <script>
      // Pre-hydration theme so the first paint matches stored preference.
      (function () {
        try {
          var raw = localStorage.getItem('chroma-lab');
          var theme = raw ? (JSON.parse(raw).state || {}).theme : null;
          if (theme === 'light') document.documentElement.classList.remove('dark');
          else document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
