<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0b10" />
    <meta name="description" content="Chroma Lab — 이미지, 색이론, OKLCH 톤 스케일로 아름답고 접근성 높은 컬러 팔레트를 디자인하고 Tailwind, CSS 변수, JSON으로 바로 내보내세요." />
    <link rel="preconnect" href="https://rsms.me/" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />
    <title>Chroma Lab — 디자이너와 개발자를 위한 팔레트 스튜디오</title>
    <script>
      // Pre-hydration theme so the first paint matches stored preference.
      (function () {
        try {
          var raw = localStorage.getItem('chroma-lab');
          var theme = raw ? (JSON.parse(raw).state || {}).theme : null;
          if (theme === 'light') document.documentElement.classList.remove('dark');
          else document.documentElement.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
